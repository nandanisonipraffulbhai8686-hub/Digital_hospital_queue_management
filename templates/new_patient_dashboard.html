<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Patient Dashboard</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 40px;
        color: #fff;
    }

    h1 {
        text-align: center;
        margin-bottom: 40px;
        font-size: 32px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        max-width: 900px;
        margin: auto;
    }

    .card {
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        transition: 0.3s ease;
    }

    .card:hover {
        transform: translateY(-8px);
        background: rgba(255,255,255,0.25);
    }

    .card h3 {
        margin-bottom: 15px;
    }

    .card p {
        font-size: 14px;
        opacity: 0.9;
        margin-bottom: 20px;
    }

    .card a {
        display: inline-block;
        padding: 10px 22px;
        background: #ffffff;
        color: #764ba2;
        border-radius: 25px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .card a:hover {
        background: #764ba2;
        color: #fff;
    }

    .logout {
        text-align: center;
        margin-top: 40px;
    }

    .logout a {
        color: #fff;
        text-decoration: underline;
        font-size: 14px;
    }
</style>
</head>

<body>

<h1>Welcome, {{ patient }}</h1>

<div class="grid">
    <div class="card">
        <h3>Book Appointment</h3>
        <p>Schedule your first appointment with a doctor.</p>
        <a href="/appointments">Book Now</a>
    </div>

    <div class="card">
        <h3>View Profile</h3>
        <p>Check your personal information and details.</p>
        <a href="#">View</a>
    </div>

    <div class="card">
        <h3>Hospital Info</h3>
        <p>Get information about departments and services.</p>
        <a href="#">Explore</a>
    </div>
</div>

<div class="logout">
    <a href="/logout">Logout</a>
</div>

</body>
</html>
