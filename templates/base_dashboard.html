<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ title }}</title>

<style>
*{
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    transition: background 0.4s ease;
}

/* ── DARK MODE BACKGROUND ── */
html[data-theme="dark"] body {
    background: linear-gradient(135deg,#6b63c4 0%,#7c6abf 40%,#9b6bbf 100%) !important;
}

.container{
    width:90%;
    max-width:1100px;
    animation: fadeSlide 0.9s ease;
}

@keyframes fadeSlide{
    from{
        opacity:0;
        transform: translateY(30px);
    }
    to{
        opacity:1;
        transform: translateY(0);
    }
}

.header{
    color:white;
    font-size:28px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:14px;
    padding:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    transition: transform 0.3s ease;
}

.card:hover{
    transform: translateY(-6px);
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#5567d9;
}

.emergency{
    background:#ff4d4d;
}
.emergency:hover{
    background:#e84343;
}
</style>

<!-- Apply dark theme BEFORE page renders to prevent flash -->
<script>
(function(){
    try {
        var t = localStorage.getItem('patient-dashboard-theme');
        if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
    } catch(e){}
})();
</script>

</head>
<body>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
